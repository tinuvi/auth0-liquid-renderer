name: Publish

# Tests + lint run on every PR and on the release tag. The image is built and
# pushed ONLY on a version tag like 0.1.0 (-> :<version> + :latest). Branch pushes
# (incl. merges to main) and pull requests never publish. Needs repo secrets
# DOCKER_HUB_USER / DOCKER_HUB_PASSWORD.

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests (Docker Compose)
        run: docker compose run --rm --remove-orphans integration-tests

      # Check-only lint (no --autocorrect-all) so the job fails on offenses.
      - name: Lint (check-only)
        run: docker compose run --rm --no-deps lint-formatter sh -c "bundle install && bundle exec rubocop"

  build-and-publish:
    needs: verify
    # Publish only on a version tag — never on branch pushes or pull requests.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          # tag 0.1.0 -> :0.1.0 + :latest (:latest added by metadata-action's latest=auto)
          tags: |
            type=semver,pattern={{version}}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
