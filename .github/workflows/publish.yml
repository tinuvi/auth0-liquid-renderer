name: Publish

# Tests + lint run on every PR and push. The image is built and pushed ONLY on a
# push to main (-> :latest + :sha) or a version tag like 0.1.0 (-> :<version> + :latest).
# Pull requests never publish. Needs repo secrets DOCKER_HUB_USER / DOCKER_HUB_PASSWORD.

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests (Docker Compose)
        run: docker compose run --rm --remove-orphans integration-tests

      # Check-only lint (no --autocorrect-all) so the job fails on offenses.
      - name: Lint (check-only)
        run: docker compose run --rm --no-deps lint-formatter sh -c "bundle install && bundle exec rubocop"

  build-and-publish:
    needs: verify
    # Publish only on a push to main or a version tag — never on pull requests.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          # main push -> :latest + :sha-<short>; tag 0.1.0 -> :0.1.0 + :latest
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
